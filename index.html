<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Junwei Cheng's academic homepage">
    <title>Junwei Cheng | Homepage</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topbar">
        <nav class="site-shell nav" aria-label="Primary navigation">
            <a class="home-link" href="#home">Homepage</a>
            <div class="nav-links">
                <a href="#about">About Me</a>
                <a href="#all-publications">All Publications</a>
                <a href="#honors">Honors & Projects</a>
                <a href="#service">Service</a>
            </div>
        </nav>
    </header>

    <div class="site-shell page-layout" id="home">
        <aside class="sidebar">
            <section class="profile-card" aria-label="Profile">
                <img id="profile-photo" class="profile-photo" src="images/banner.jpg" alt="Junwei Cheng">
                <h1 id="profile-name">Junwei Cheng</h1>
                <p id="profile-title" class="profile-title">Ph.D. Candidate</p>
                <p id="profile-affiliation" class="profile-affiliation">South China Normal University</p>
                <dl class="profile-meta" id="profile-meta"></dl>
                <div class="profile-links" id="profile-links"></div>
            </section>

            <section class="maple-note" aria-label="MapleStory accents">
                <div class="maple-mascots">
                    <img class="monster mascot-img" src="images/mob-slime.webp" alt="">
                    <p class="maple-quote" id="maple-quote"></p>
                    <img class="monster mascot-img" src="images/mob-orange-mushroom.webp" alt="">
                </div>
            </section>
        </aside>

        <main class="content">
            <section class="intro section" id="about">
                <h2 class="section-title">About Me <span class="maple-leaf" aria-label="maple leaf">🍁</span></h2>
                <div class="copy-block" id="about-content"></div>
            </section>

            <section class="section" id="all-publications">
                <div class="section-head publication-head">
                    <h2>All Publications</h2>
                    <div class="publication-tools">
                        <label class="search-box" for="publication-search">
                            <span>Search</span>
                            <input id="publication-search" type="search" placeholder="title, venue, author">
                        </label>
                        <div class="year-filter" id="year-filter" aria-label="Filter publications by year"></div>
                    </div>
                </div>
                <div class="publication-years" id="publication-years"></div>
            </section>

            <section class="section" id="honors">
                <div class="tab-header">
                    <h2>Honors & Projects</h2>
                    <div class="tabs" role="tablist" aria-label="Honors and projects">
                        <button class="tab-button active" type="button" role="tab" aria-selected="true" aria-controls="honors-panel" id="honors-tab" data-tab="honors">Honors Awarded</button>
                        <button class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="projects-panel" id="projects-tab" data-tab="projects">Projects</button>
                    </div>
                </div>
                <div class="tab-panel active" id="honors-panel" role="tabpanel" aria-labelledby="honors-tab">
                    <ul class="achievement-list" id="honor-list"></ul>
                </div>
                <div class="tab-panel" id="projects-panel" role="tabpanel" aria-labelledby="projects-tab" hidden>
                    <div class="project-list" id="project-list"></div>
                </div>
            </section>

            <section class="section" id="service">
                <h2>Professional Service</h2>
                <div class="service-list" id="service-list"></div>
            </section>
        </main>
    </div>

    <footer class="site-footer">
        <div class="site-shell">
            <p id="footer-text"></p>
        </div>
    </footer>

    <script src="homepage-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
